server:
  port: ${PORT:8090}

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: telemetry-pipeline
  cloud:
    function:
      definition: telemetryPipeline;reservationPipeline;routePipeline
    discovery:
      enabled: true

    stream:
      defaultBinder: kafka

      function:
        definition: telemetryPipeline;reservationPipeline;routePipeline

      bindings:
        # Existing telemetry pipeline
        telemetryPipeline-in-0:
          destination: telemetry.raw
          group: telemetry-pipeline
          content-type: application/json
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
        telemetryPipeline-out-0:
          destination: telemetry.alerts
          content-type: application/json

        # Reservation events: consume from starport.reservations, publish enriched
        reservationPipeline-in-0:
          destination: starport.reservations
          group: telemetry-pipeline
          content-type: application/json
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
        reservationPipeline-out-0:
          destination: telemetry.enriched-reservations
          content-type: application/json

        # Route events: consume from starport.route-planned, publish enriched
        routePipeline-in-0:
          destination: starport.route-planned
          group: telemetry-pipeline
          content-type: application/json
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
        routePipeline-out-0:
          destination: telemetry.enriched-routes
          content-type: application/json

      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
          # ADR-0017: enable Micrometer Observation so the consumer EXTRACTS traceparent from
          # incoming Kafka headers and continues the trace. Without it the carefully propagated
          # context (outbox SenderContext, planner producer span) is dropped at the consumer and
          # telemetry starts a brand-new root trace.
          enable-observation: true
          autoCreateTopics: true
          autoAddPartitions: true
          configuration:
            auto.offset.reset: latest
        bindings:
          # Dead-letter queues: catch failures the in-pipeline try/catch CANNOT reach — payloads that
          # fail message conversion/deserialization before the function runs. Without enableDlq such a
          # poison message is retried (max-attempts) then silently dropped. With it, the message lands
          # on a .dlq topic for inspection/replay instead of vanishing. (Filter exceptions inside the
          # pipeline are handled explicitly by PipelineBuilder — logged, counted, and dropped there.)
          telemetryPipeline-in-0:
            consumer:
              enableDlq: true
              dlqName: telemetry.raw.dlq
          reservationPipeline-in-0:
            consumer:
              enableDlq: true
              dlqName: starport.reservations.dlq
          routePipeline-in-0:
            consumer:
              enableDlq: true
              dlqName: starport.route-planned.dlq

  jackson:
    serialization:
      write-dates-as-timestamps: false

# Sensor threshold defaults — override per environment
telemetry:
  thresholds:
    sensors:
      TEMPERATURE:
        lower: -50.0
        upper: 300.0
      RADIATION:
        lower: 0.0
        upper: 1000.0
      FUEL_LEVEL:
        lower: 5.0
        upper: 100.0
      ENGINE_VIBRATION:
        lower: 0.0
        upper: 80.0
      HULL_INTEGRITY:
        lower: 20.0
        upper: 100.0
      OXYGEN_LEVEL:
        lower: 18.0
        upper: 100.0

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    healthcheck:
      enabled: true
  instance:
    instance-id: ${spring.application.name}:${spring.cloud.client.hostname:${HOSTNAME:unknown}}:${server.port}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:http://localhost:4318/v1/logs}
      transport: http
  metrics:
    enable:
      kafka: true
    distribution:
      # Histogram aktywuje sam `slo:` — `percentiles-histogram` zbędny (powodował dorzucanie
      # ~50 auto-bucketów per metryka oprócz naszych SLO progów).
      slo:
        http.server.requests:        50ms,100ms,250ms,500ms,1s,2500ms,5s,10s
        telemetry.filter.validation: 100us,500us,1ms,5ms,10ms,50ms,100ms
        telemetry.filter.enrichment: 100us,500us,1ms,5ms,10ms,50ms,100ms
        telemetry.filter.aggregation: 100us,500us,1ms,5ms,10ms,50ms,100ms
        telemetry.filter.anomaly:    100us,500us,1ms,5ms,10ms,50ms,100ms
        events.reservation.lag:      100ms,500ms,1s,5s,10s,30s,60s,300s
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,liveness,readiness
  tracing:
    sampling:
      probability: ${TRACE_SAMPLING:1.0}
    # ADR-0017: telemetry is the terminal hop — it must also extract the business-correlation
    # baggage so reservationId/routeId reach the trace context and MDC. Without this the baggage
    # chain silently ends one service short of the consumer that needs it most.
    baggage:
      remote-fields:
        - reservationId
        - routeId
      correlation:
        fields:
          - reservationId
          - routeId

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  level:
    com.galactic.telemetry: DEBUG
    org.springframework.cloud.stream: INFO
    org.springframework.kafka: INFO
