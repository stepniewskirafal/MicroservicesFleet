# Production overrides (active only with spring.profiles.active=prod). The default config is tuned
# for local/Docker and is intentionally NOT production-safe.
spring:
  cloud:
    stream:
      kafka:
        binder:
          # Topics (and their .dlq) are provisioned by ops in prod, not auto-created by the app.
          autoCreateTopics: false

management:
  tracing:
    sampling:
      probability: ${TRACE_SAMPLING:0.1}
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.galactic.telemetry: INFO
