server:
  port: ${PORT:8080}
  shutdown: graceful

spring:
  application:
    name: api-gateway
  # NOTE: no `threads.virtual.enabled` here — Spring Cloud Gateway is reactive
  # (Reactor Netty event loops, not thread-per-request), so the virtual-threads
  # knob from ADR-0012 does not apply. Scaling comes from the event-loop model.
  cloud:
    gateway:
      discovery:
        locator:
          # Explicit routes below — we do NOT auto-expose every registered service.
          enabled: false
      routes:
        - id: starport-registry
          uri: lb://starport-registry
          predicates:
            - Path=/api/v1/starports/**
          # No rewrite — backend expects the full /api/v1/starports/** path.
        # trade-route-planner is intentionally NOT routed here. It is an internal-only
        # service: starport-registry reaches it directly via lb://trade-route-planner
        # (Eureka client-side LB), never through the gateway. Exposing /api/v1/routes/**
        # publicly was redundant attack surface — removed so the planner has no public
        # ingress. ADR-0031.

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: ${spring.application.name}:${HOSTNAME:unknown}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,liveness,readiness,gateway
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACE_SAMPLING:1.0}
  otlp:
    # Correct Spring Boot property is `management.otlp.tracing.endpoint`. The previous
    # `management.opentelemetry.tracing.export.otlp.endpoint` is not a recognised key, so the
    # exporter fell back to the default localhost:4318 and every gateway span failed to export
    # (0 traces in Tempo). All other services use this same `management.otlp.tracing.endpoint`.
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:http://localhost:4318/v1/logs}
      transport: http

logging:
  pattern:
    level: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
