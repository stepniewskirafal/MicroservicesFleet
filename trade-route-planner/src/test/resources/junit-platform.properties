# Enable JUnit 5 native parallel test execution
junit.jupiter.execution.parallel.enabled=true

# Test methods within a class run sequentially by default;
# use @Execution(CONCURRENT) on a class to opt-in to method-level parallelism.
junit.jupiter.execution.parallel.mode.default=same_thread

# Test classes run concurrently (complements Surefire's parallel=classes config).
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# Dynamic strategy: use 2× the available CPU cores as the thread pool size.
junit.jupiter.execution.parallel.config.strategy=dynamic
junit.jupiter.execution.parallel.config.dynamic.factor=2
