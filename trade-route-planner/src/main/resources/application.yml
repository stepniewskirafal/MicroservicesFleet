server:
  port: ${PORT:8082}

spring:
  application:
    name: trade-route-planner

  cloud:
    discovery:
      enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    # Push Spring Boot Actuator health status to Eureka so the registry reflects
    # the real application state, not just heartbeat liveness.
    healthcheck:
      enabled: true
  instance:
    instance-id: ${spring.application.name}:${spring.cloud.client.hostname:${HOSTNAME:unknown}}:${server.port}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://tempo:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,liveness,readiness
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
  metrics:
    distribution:
      percentiles-histogram:
        routes.risk.score: true
        routes.eta.hours: true
        routes.plan: true
      percentiles:
        routes.risk.score: 0.5,0.9,0.99
        routes.eta.hours: 0.5,0.9,0.99
      minimum-expected-value:
        routes.plan: 5ms
      maximum-expected-value:
        routes.plan: 5s
      slo:
        routes.plan: 10ms,50ms,100ms,200ms,500ms,1s,2s,5s

logging:
  level:
    com.galactic.traderoute: INFO
