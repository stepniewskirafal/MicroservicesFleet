server:
  port: ${PORT:8082}

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: trade-route-planner

  cloud:
    discovery:
      enabled: true

    stream:
      defaultBinder: kafka

      bindings:
        routePlanned-out-0:
          destination: starport.route-planned
          content-type: application/json

      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
          autoCreateTopics: true
          autoAddPartitions: false
          configuration:
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: org.apache.kafka.common.serialization.ByteArraySerializer

  jackson:
    serialization:
      write-dates-as-timestamps: false

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    # Push Spring Boot Actuator health status to Eureka so the registry reflects
    # the real application state, not just heartbeat liveness.
    healthcheck:
      enabled: true
  instance:
    instance-id: ${spring.application.name}:${spring.cloud.client.hostname:${HOSTNAME:unknown}}:${server.port}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,liveness,readiness
  tracing:
    sampling:
      probability: ${TRACE_SAMPLING:1.0}
    baggage:
      remote-fields:
        - reservationId
        - routeId
      correlation:
        fields:
          - reservationId
          - routeId
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        routes.risk.score: true
        routes.eta.hours: true
        routes.plan: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
        routes.risk.score: 0.5,0.9,0.99
        routes.eta.hours: 0.5,0.9,0.99
      minimum-expected-value:
        http.server.requests: 5ms
        routes.plan: 5ms
      maximum-expected-value:
        http.server.requests: 10s
        routes.plan: 5s
      slo:
        routes.plan: 10ms,50ms,100ms,200ms,500ms,1s,2s,5s

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  level:
    com.galactic.traderoute: INFO
