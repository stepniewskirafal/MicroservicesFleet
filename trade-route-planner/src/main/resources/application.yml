server:
  port: ${PORT:8082}

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: trade-route-planner

  cloud:
    discovery:
      enabled: true

    stream:
      defaultBinder: kafka

      bindings:
        routePlanned-out-0:
          destination: starport.route-planned
          content-type: application/json

      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
          autoCreateTopics: true
          autoAddPartitions: false
          configuration:
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: org.apache.kafka.common.serialization.ByteArraySerializer

  jackson:
    serialization:
      write-dates-as-timestamps: false

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    # Push Spring Boot Actuator health status to Eureka so the registry reflects
    # the real application state, not just heartbeat liveness.
    healthcheck:
      enabled: true
  instance:
    instance-id: ${spring.application.name}:${spring.cloud.client.hostname:${HOSTNAME:unknown}}:${server.port}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://tempo:4318/v1/traces}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:http://alloy:4318/v1/logs}
      transport: http
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,liveness,readiness
  tracing:
    sampling:
      probability: ${TRACE_SAMPLING:1.0}
    baggage:
      remote-fields:
        - reservationId
        - routeId
      correlation:
        fields:
          - reservationId
          - routeId
  metrics:
    enable:
      kafka: true
    distribution:
      # Histogram aktywuje sam `slo:` — usuwamy `percentiles-histogram`, `percentiles` (Summary
      # nie agreguje się poprawnie między instancjami) i `min/max-expected-value` (martwa
      # konfiguracja bez auto-bucketów).
      slo:
        http.server.requests: 50ms,100ms,250ms,500ms,1s,2500ms,5s,10s
        routes.plan:          10ms,50ms,100ms,200ms,500ms,1s,2s,5s

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  level:
    com.galactic.traderoute: INFO
