services:

  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  eureka:
    build:
      context: ../../
      dockerfile: eureka-server/Dockerfile
    container_name: eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  zipkin:
    image: openzipkin/zipkin:2.24
    container_name: zipkin
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9411/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus:ro
    ports:
      - "9090:9090"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: starports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d starports"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"               # HOST listener – dostępny z localhost (Postman, IntelliJ)
    environment:
      # KRaft – bez Zookeepera
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094

      # Broker nasłuchuje na 3 adresach:
      #  PLAINTEXT_HOST   – klienci z hosta (localhost:9092)
      #  PLAINTEXT_DOCKER – kontenery w sieci Compose (kafka:9093)
      #  CONTROLLER       – KRaft quorum
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT_DOCKER://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT_DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT_DOCKER:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_DOCKER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 1
    healthcheck:
      # Broker jest gotowy, gdy odpowiada na API-versions request
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9093 > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
    depends_on:
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # APPLICATION SERVICES
  # ─────────────────────────────────────────────

  starport-registry-1:
    build:
      context: ../../
      dockerfile: starport-registry/Dockerfile
    container_name: starport-registry-1
    depends_on:
      eureka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      PORT: 8081
      EUREKA_URL: http://eureka:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/starports
      DB_USER: postgres
      DB_PASS: postgres
      KAFKA_BROKERS: kafka:9093
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  starport-registry-2:
    build:
      context: ../../
      dockerfile: starport-registry/Dockerfile
    container_name: starport-registry-2
    depends_on:
      eureka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      PORT: 8084
      EUREKA_URL: http://eureka:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/starports
      DB_USER: postgres
      DB_PASS: postgres
      KAFKA_BROKERS: kafka:9093
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  trade-route-planner-1:
    build:
      context: ../../
      dockerfile: trade-route-planner/Dockerfile
    container_name: trade-route-planner-1
    depends_on:
      eureka:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      PORT: 8082
      EUREKA_URL: http://eureka:8761/eureka
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  trade-route-planner-2:
    build:
      context: ../../
      dockerfile: trade-route-planner/Dockerfile
    container_name: trade-route-planner-2
    depends_on:
      eureka:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      PORT: 8083
      EUREKA_URL: http://eureka:8761/eureka
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
