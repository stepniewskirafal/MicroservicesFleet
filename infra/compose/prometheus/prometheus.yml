global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'starport-registry'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 'starport-registry-1:8081'
          - 'starport-registry-2:8084'

  - job_name: 'trade-route-planner'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 'trade-route-planner-1:8082'
          - 'trade-route-planner-2:8083'

  - job_name: 'eureka'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['eureka:8761']
