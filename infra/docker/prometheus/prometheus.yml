global:
    scrape_interval: 3s
    evaluation_interval: 3s

# Prometheus lives on the Compose network, so we target containers by name +
# unified internal port (ADR-0031 — host ports removed from app instances).
# Adding a replica is a one-line change: extend the targets array.
scrape_configs:
  - job_name: "api-gateway"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: "starport-registry"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["starport-registry-1:8081", "starport-registry-2:8081"]

  - job_name: "trade-route-planner"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["trade-route-planner-1:8082", "trade-route-planner-2:8082"]

  - job_name: "telemetry-pipeline"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["telemetry-pipeline-1:8090", "telemetry-pipeline-2:8090"]

  - job_name: "eureka"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eureka:8761"]

  - job_name: "loki"
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]
