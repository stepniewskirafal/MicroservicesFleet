server:
  http_listen_port: 3200
distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  # local-blocks processor enables TraceQL metrics queries
  # (`{ ... } | rate()`, `quantile_over_time(...)`) by buffering
  # recent spans on local disk so Tempo can scan them ad-hoc
  # from Grafana panels with the Tempo datasource.
  #
  # In Tempo 2.5+ both filter_server_spans_from_root_span and
  # flush_to_storage were removed from this config block:
  #   - root-span filtering is now controlled at query time in TraceQL
  #     (`{ kind = server && parent = nil }`) rather than processor-side
  #   - on-disk persistence is implicit when traces_storage.path is set
  processor:
    local_blocks: {}
  traces_storage:
    path: /tmp/tempo/generator/traces
overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]
