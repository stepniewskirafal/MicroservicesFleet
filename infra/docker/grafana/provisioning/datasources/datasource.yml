apiVersion: 1

datasources:
  # Wskazuje na Thanos Query (nie bezpośrednio Prometheusa) — globalny widok
  # sidecar (świeże) + store (historia z MinIO). uid bez zmian, więc wszystkie
  # dashboardy działają dalej, ale z długą retencją. Thanos Query jest
  # Prometheus-API-compatible (łącznie z exemplarami przez sidecar).
  - name: Prometheus
    uid: PBFA97CFB590B2093
    type: prometheus
    access: proxy
    url: http://thanos-query:10902
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      prometheusType: Thanos
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: true
    jsonData:
      tracesToMetrics:
        datasourceUid: PBFA97CFB590B2093
      tracesToLogs:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
        mapTagNamesEnabled: true
        mappedTags:
          - key: service.name
            value: service
      serviceMap:
        datasourceUid: PBFA97CFB590B2093
      nodeGraph:
        enabled: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: "\\[\\w[\\w-]*,(\\w{16,32}),\\w+\\]"
          name: traceId
          url: "$${__value.raw}"