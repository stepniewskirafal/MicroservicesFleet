services:
  #    collector:
  #        image: otel/opentelemetry-collector:0.103.1
  #        extra_hosts: ['host.docker.internal:host-gateway']
  #        volumes:
  #            - ./docker/otel-collector/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
  #        ports:
  #            - 1888:1888 # pprof extension
  #            - 8888:8888 # Prometheus metrics exposed by the collector
  #            - 8889:8889 # Prometheus exporter metrics
  #            - 13133:13133 # health_check extension
  #            - 4318:4318 # OTLP http receiver (for metrics and spans)
  #            - 55679:55679 # zpages extension
  prometheus:
    image: prom/prometheus:v2.54.1 # https://hub.docker.com/r/prom/prometheus
    extra_hosts: ['host.docker.internal:host-gateway']
    command:
      - --enable-feature=exemplar-storage
      - --enable-feature=otlp-write-receiver
      - --web.enable-remote-write-receiver
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - prometheus:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:10.4.10 # https://hub.docker.com/r/grafana/grafana/tags
    extra_hosts: ['host.docker.internal:host-gateway']
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./docker/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
  tempo:
    image: grafana/tempo:2.4.2 # https://hub.docker.com/r/grafana/tempo/tags and https://github.com/grafana/tempo/releases
    extra_hosts: ['host.docker.internal:host-gateway']
    command: ['-config.file=/etc/tempo.yml']
    volumes:
      - tempo:/tmp/tempo
      - ./docker/grafana/tempo.yml:/etc/tempo.yml:ro
    ports:
      - "3200:3200"    # tempo
      - "4318:4318"  # otlp http
  loki:
    image: grafana/loki:3.1.2 # https://hub.docker.com/r/grafana/loki/tags and https://github.com/grafana/loki/releases
    extra_hosts: ['host.docker.internal:host-gateway']
    command: ['-config.file=/etc/loki/local-config.yaml']
    ports:
      - "3100:3100"



  eureka:
    build:
      context: ../
      dockerfile: eureka-server/Dockerfile
    container_name: eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
  zipkin:
    image: openzipkin/zipkin:2.24
    container_name: zipkin
    ports:
      - "9411:9411"
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: starports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d starports"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT_DOCKER://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT_DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT_DOCKER:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 1
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093

  starport-registry-1:
    build:
      context: ../
      dockerfile: starport-registry/Dockerfile
    depends_on:
      eureka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      zipkin:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      PORT: 8081
      EUREKA_URL: http://eureka:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/starports
      DB_USER: postgres
      DB_PASS: postgres
      KAFKA_BROKERS: kafka:9093
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  starport-registry-2:
    build:
      context: ../
      dockerfile: starport-registry/Dockerfile
    depends_on:
      eureka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      zipkin:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      PORT: 8084
      EUREKA_URL: http://eureka:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/starports
      DB_USER: postgres
      DB_PASS: postgres
      KAFKA_BROKERS: kafka:9093
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  trade-route-planner-1:
    build:
      context: ../
      dockerfile: trade-route-planner/Dockerfile
    depends_on:
      eureka:
        condition: service_healthy
      zipkin:
        condition: service_started
    environment:
      PORT: 8082
      EUREKA_URL: http://eureka:8761/eureka
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  trade-route-planner-2:
    build:
      context: ../
      dockerfile: trade-route-planner/Dockerfile
    depends_on:
      eureka:
        condition: service_healthy
      zipkin:
        condition: service_started
    environment:
      PORT: 8083
      EUREKA_URL: http://eureka:8761/eureka
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  prometheus:
    driver: local
  tempo:
    driver: local

