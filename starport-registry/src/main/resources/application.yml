server:
  port: ${PORT:8081}
  tomcat:
    threads:
      max: 60
      min-spare: 15
    accept-count: 200
    max-connections: 2000

spring:
  application:
    name: starport-registry

  task:
    scheduling:
      pool:
        size: 2
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/starports}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      leak-detection-threshold: 10000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none #validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        use_sql_comments: true
        hibernate.id.optimizer.pooled.preferred: pooled-lo

  cloud:
    discovery:
      enabled: true

    loadbalancer:
      # Health-check supplier: ping each instance's /actuator/health before routing to it.
      # Removes instances that return non-2xx from the active pool without waiting for Eureka eviction.
      health-check:
        initial-delay: 0s
        interval: 5s
        path:
          default: /actuator/health
      # LB stats via Micrometer — enable and avoid high-cardinality path tags
      stats:
        micrometer:
          enabled: true
        include-path: false

    stream:
      defaultBinder: kafka

      # === BINDINGS (producers) ===
      bindings:
        reservationCreated-out-0:
          destination: starport.reservations
          producer:
            partitionKeyExpression: headers['kafka_messageKey']
            partitionCount: 3
        tariffCalculated-out-0:
          destination: starport.tariffs
          contentType: application/json
        routeChanged-out-0:
          destination: starport.route-changes
          contentType: application/json

      # === KAFKA-SPECIFIC ===
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
          # Binder can create topics (regardless of broker-side settings).
          autoCreateTopics: true
          # Will not add partitions if existing topic has fewer than the app expects.
          autoAddPartitions: false
          configuration:
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: org.apache.kafka.common.serialization.ByteArraySerializer
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Allow V5 to run even if V2 checksum changed (was modified after first apply)
    validate-on-migrate: false

telemetry:
  adapter: stream  # TelemetryPort adapter switch: stream | kafka

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    healthcheck:
      enabled: true
  instance:
    instance-id: ${spring.application.name}:${spring.cloud.client.hostname:${HOSTNAME:unknown}}:${server.port}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4318/v1/traces}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4318/v1/logs}
  metrics:
    distribution:
      percentiles-histogram:
        reservations.fees.calculated.amount: true
        reservations.fees.calculated.hours: true
        reservations.hold.allocate: true
        reservations.route.plan: true
        reservations.fees.calculate: true
      percentiles:
        reservations.fees.calculated.amount: 0.5,0.9,0.99
        reservations.fees.calculated.hours: 0.5,0.9,0.99
      minimum-expected-value:
        reservations.hold.allocate: 5ms
        reservations.fees.calculate: 1ms
        reservations.route.plan: 50ms
      maximum-expected-value:
        reservations.hold.allocate: 2s
        reservations.fees.calculate: 500ms
        reservations.route.plan: 10s
      slo:
        reservations.hold.allocate: 10ms,50ms,100ms,500ms,1s,2s
        reservations.fees.calculate: 1ms,5ms,10ms,50ms,100ms
        reservations.route.plan: 50ms,100ms,200ms,500ms,1s,2s,5s
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,liveness,readiness
  tracing:
    sampling:
      probability: ${TRACE_SAMPLING:1.0}
    baggage:
      remote-fields:
        - reservationId
        - routeId
      correlation:
        fields:
          - reservationId
          - routeId
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
  task:
    scheduling:
      pool:
        size: 1
app:
  trade-route-planner:
    base-url: http://trade-route-planner
  events:
    topics:
      # These are BINDING NAMES (for StreamBridge), not Kafka topic names.
      reservations: reservationCreated-out-0
      tariffs:      tariffCalculated-out-0
      routeChanges: routeChanged-out-0
  poll-interval-ms: 5000
  batch-size: 200
  max-attempts: 10


resilience4j:
  circuitbreaker:
    instances:
      trade-route-planner:
        register-health-indicator: true
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
  timelimiter:
    instances:
      trade-route-planner:
        timeout-duration: 3s

downstream:
  http:
    connect-timeout-ms: 200
    read-timeout-ms: 2000

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

    org.springframework.cloud.stream: DEBUG
    org.springframework.integration: DEBUG
    org.springframework.kafka: INFO
