server:
  port: ${PORT:8081}
  tomcat:
    threads:
      max: 60
      min-spare: 15
    accept-count: 200
    max-connections: 2000

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: starport-registry

  # Serialize Instant/dates as ISO-8601 strings, not epoch arrays. The outbox payload (Instant
  # start/end, producedAt) is consumed by telemetry-pipeline, which expects ISO; without this the
  # default epoch-array format breaks deserialization and the events.reservation.lag metric. Matches
  # the planner and telemetry services, which already set this.
  jackson:
    serialization:
      write-dates-as-timestamps: false

  task:
    scheduling:
      pool:
        # Three @Scheduled jobs now share this pool: outbox relay, dock-occupancy gauge, HOLD reaper.
        size: 3
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/starports}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      leak-detection-threshold: 10000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none #validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        use_sql_comments: true
        hibernate.id.optimizer.pooled.preferred: pooled-lo

  cloud:
    discovery:
      enabled: true

    loadbalancer:
      # Health-check supplier: ping each instance's /actuator/health before routing to it.
      # Removes instances that return non-2xx from the active pool without waiting for Eureka eviction.
      health-check:
        initial-delay: 0s
        interval: 5s
        path:
          default: /actuator/health
      # LB stats via Micrometer — enable and avoid high-cardinality path tags
      stats:
        micrometer:
          enabled: true
        include-path: false

    stream:
      defaultBinder: kafka

      # === BINDINGS (producers) ===
      bindings:
        # Name matches the producer event type "ReservationConfirmed" and telemetry's
        # ReservationConfirmedEvent — consistent across producer/consumer. Destination topic
        # (starport.reservations) is the wire contract and is unchanged.
        reservationConfirmed-out-0:
          destination: starport.reservations
          producer:
            partitionKeyExpression: headers['kafka_messageKey']
            partitionCount: 3
        # (Removed dead bindings tariffCalculated-out-0 / routeChanged-out-0 — no producer code
        # referenced them; their topics starport.tariffs / starport.route-changes were never written.)

      # === KAFKA-SPECIFIC ===
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
          # ADR-0017: turns on Micrometer Observation for the binder's KafkaTemplate (producer)
          # and listener containers (consumer). Without it the binder injects/extracts NO
          # traceparent, so every Kafka hop starts a disconnected trace. Required end-to-end.
          enable-observation: true
          # Binder can create topics (regardless of broker-side settings).
          autoCreateTopics: true
          # Grow an existing topic to the partition count this app expects. Required because the
          # reservationConfirmed-out-0 producer asks for partitionCount: 3, but a consumer (telemetry)
          # may auto-create starport.reservations first with 1 partition. With this false the producer
          # binding fails to provision (ProvisioningException: expected 3, found 1) and every outbox
          # publish FAILs after max-attempts. true lets starport bump 1 → 3 instead.
          autoAddPartitions: true
          configuration:
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: org.apache.kafka.common.serialization.ByteArraySerializer
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Allow V5 to run even if V2 checksum changed (was modified after first apply)
    validate-on-migrate: false

telemetry:
  adapter: stream  # TelemetryPort adapter switch: stream | kafka

reservations:
  hold:
    # A HOLD older than ttl-ms that is still unconfirmed is considered orphaned and reaped.
    # Must exceed worst-case confirm latency (planner HTTP timeout ~3s) by a wide margin.
    ttl-ms: 120000
    reaper:
      interval-ms: 60000
      initial-delay-ms: 60000

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    healthcheck:
      enabled: true
  instance:
    instance-id: ${spring.application.name}:${spring.cloud.client.hostname:${HOSTNAME:unknown}}:${server.port}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:http://localhost:4318/v1/logs}
      transport: http
  metrics:
    enable:
      kafka: true
    distribution:
      # Histogram is activated by the presence of `slo:` alone — no need for percentiles-histogram.
      # Client-side `percentiles:` (Summary) intentionally omitted: in a multi-instance setup their
      # values cannot be aggregated correctly. Use histogram_quantile() over _bucket in PromQL instead.
      slo:
        http.server.requests:             50ms,100ms,250ms,500ms,1s,2500ms,5s,10s
        reservations.hold.allocate:       5ms,10ms,25ms,50ms,100ms,250ms,500ms,1s
        reservations.fees.calculate:      1ms,5ms,10ms,50ms,100ms
        reservations.route.plan:          50ms,100ms,200ms,500ms,1s,2s,5s
        reservations.confirm:             5ms,10ms,25ms,50ms,100ms,250ms,500ms,1s,2s
        reservations.outbox.append:       1ms,5ms,10ms,25ms,50ms,100ms,250ms,500ms
        reservations.inbox.publish:       10ms,25ms,50ms,100ms,250ms,500ms,1s,2s,5s
        reservations.inbox.poll.duration: 5ms,10ms,50ms,100ms,500ms,1s,5s
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,liveness,readiness
  tracing:
    sampling:
      probability: ${TRACE_SAMPLING:1.0}
    baggage:
      remote-fields:
        - reservationId
        - routeId
      correlation:
        fields:
          - reservationId
          - routeId
  task:
    scheduling:
      pool:
        size: 1
app:
  trade-route-planner:
    base-url: http://trade-route-planner
  events:
    topics:
      # This is a BINDING NAME (for StreamBridge), not a Kafka topic name.
      reservations: reservationConfirmed-out-0
  poll-interval-ms: 5000
  batch-size: 200
  max-attempts: 10


resilience4j:
  circuitbreaker:
    instances:
      trade-route-planner:
        register-health-indicator: true
        failure-rate-threshold: 50
        # Slow-call detection: a call that returns successfully but takes >= slow-call-duration-threshold
        # counts as "slow". When slow-call-rate exceeds the threshold the circuit opens just like on
        # failures — this catches gradual degradation (rising p99), not only hard 5xx/connection errors.
        # Threshold sits below the 800ms read-timeout (RestClientConfig) so a slow-but-completing call is
        # recorded as slow rather than timing out into a failure. Drives resilience4j_circuitbreaker_slow_call_rate.
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 500ms
        wait-duration-in-open-state: 10s
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
  # Retry the planner call once on failure: with 2 planner replicas behind Eureka, a single bad
  # instance would otherwise fail ~50% of calls with no second chance. The load balancer picks an
  # instance per attempt, so the retry usually lands on the healthy replica. maxAttempts counts the
  # first try, so 2 = one retry. @Retry wraps @CircuitBreaker, whose fallback funnels every failure
  # into RouteUnavailableException, so that is what we retry on. Tradeoff: a deterministic domain
  # rejection (e.g. insufficient range) is retried once too (minor waste), and a read-timeout where
  # the planner already processed the request could duplicate the route event — acceptable given
  # planning is sub-second; fully-safe retry would need an idempotency key (out of scope).
  retry:
    instances:
      trade-route-planner:
        max-attempts: 2
        wait-duration: 100ms
        retry-exceptions:
          - com.galactic.starport.service.routeplanner.RouteUnavailableException
  # (Removed dead timelimiter config: TimeLimiter only applies to async/Future return types, but
  # calculateRoute is synchronous and not annotated @TimeLimiter — read timeouts are enforced by the
  # RestClient request factory instead.)

downstream:
  http:
    connect-timeout-ms: 200
    read-timeout-ms: 2000

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

    org.springframework.cloud.stream: DEBUG
    org.springframework.integration: DEBUG
    org.springframework.kafka: INFO
