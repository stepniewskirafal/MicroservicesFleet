server:
  port: ${PORT:8081}

spring:
  application:
    name: starport-registry

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/starports}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  cloud:
    discovery:
      enabled: true

    function:
      # Zostaw tylko jeśli masz bean Consumer o nazwie "auditReservationCreated"
      definition: auditReservationCreated

    stream:
      default:
        contentType: application/json

      # === BINDINGS ===
      bindings:
        # PRODUCERS (out) — używane przez StreamBridge w CloudStreamTelemetryAdapter
        reservationCreated-out-0:
          destination: starport.reservations.created.v1
        tariffCalculated-out-0:
          destination: starport.tariffs.calculated.v1
        incidentRecorded-out-0:
          destination: starport.incidents.recorded.v1

        # CONSUMER (in) — bean Consumer<StarportReservationCreated> o nazwie "auditReservationCreated"
        auditReservationCreated-in-0:
          destination: starport.reservations.created.v1
          group: ${spring.application.name}-audit

      # === KAFKA-SPECYFICZNE ===
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
        bindings:
          auditReservationCreated-in-0:
            consumer:
              startOffset: latest
              concurrency: 1
  flyway:
    enabled: true
    locations: classpath:db/migration

telemetry:
  adapter: stream  # przełącznik adaptera TelemetryPort: stream | kafka

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    instance-id: ${spring.application.name}:${spring.cloud.client.hostname:${HOSTNAME:unknown}}:${server.port}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: [ "health", "info", "prometheus" ]
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

app:
  events:
    topics:
      # Uwaga: to są NAZWY BINDINGÓW, nie tematy Kafki
      reservations: reservationCreated-out-0
      tariffs:      tariffCalculated-out-0
      incidents:    incidentRecorded-out-0
