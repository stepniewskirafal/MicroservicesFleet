# ============================================================
# JUnit 5 – konfiguracja równoległego wykonywania testów
# ============================================================

# Włącz równoległość
junit.jupiter.execution.parallel.enabled=true

# Metody wewnątrz klasy – sekwencyjnie (same_thread)
# Klasy – współbieżnie (concurrent)
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# Strategia dynamiczna: liczba wątków = factor * liczba dostępnych procesorów
junit.jupiter.execution.parallel.config.strategy=dynamic
junit.jupiter.execution.parallel.config.dynamic.factor=2

# ============================================================
# Adnotacje kontrolujące równoległość:
#
#   @Execution(ExecutionMode.CONCURRENT)    – klasa uruchamiana równolegle
#   @Execution(ExecutionMode.SAME_THREAD)   – klasa uruchamiana sekwencyjnie
#
#   @ResourceLock(value = "DB_TRUNCATE", mode = READ_WRITE)
#       – wyłączny dostęp (dla testów wywołujących TRUNCATE)
#
#   @ResourceLock(value = "DB_TRUNCATE", mode = READ)
#       – współdzielony odczyt (dla testów wstawiających unikalne dane)
#       – mogą działać równolegle z innymi READ, ale nie z READ_WRITE
# ============================================================
