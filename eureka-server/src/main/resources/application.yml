server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    # WARNING: self-preservation is disabled for dev/local — enable in production
    # to prevent cascading eviction during network partitions or GC pauses.
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION:false}
    eviction-interval-timer-in-ms: 5000
    # Skraca czas, po którym klienci zobaczą nowe instancje w Eureka
    response-cache-update-interval-ms: 3000
    # Nie czekaj na synchronizację z innymi węzłami (standalone)
    wait-time-in-ms-when-sync-empty: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,liveness,readiness
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
